<!DOCTYPE html>
<html lang="ja" data-theme="default">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#D64B26">
<title>寄り道ナビ</title>
<link rel="manifest" href="manifest.json">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ══════════════════════════════════════
   Theme Variables
   ══════════════════════════════════════ */
[data-theme="default"]{
  --primary:#D64B26;--primary-dark:#B23A18;--primary-light:#EC7247;
  --bg:#F9F6F0;--surface:#fff;--surface-alt:#F1EBE1;
  --text:#26211B;--text2:#6E645A;--text3:#A2978B;
  --border:#E6DFD3;--shadow:0 2px 12px rgba(60,45,30,.07);
  --btn-grad:linear-gradient(150deg,#E05A2E,#BC3E17);
  --btn-shad:rgba(214,75,38,.32);
  --font:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic UI','Noto Sans JP',sans-serif;
  --card-radius:14px;--chip-radius:14px;
}
@media(prefers-color-scheme:dark){[data-theme="default"]{
  --bg:#1A1714;--surface:#242019;--surface-alt:#2E2820;
  --text:#EDE7DD;--text2:#A89D8F;--text3:#7A7065;
  --border:#332D24;--shadow:0 2px 12px rgba(0,0,0,.3);
  --btn-shad:rgba(224,90,46,.25);
}}
[data-theme="luxury"]{
  --primary:#8F7145;--primary-dark:#6E5530;--primary-light:#B3946B;
  --bg:#F6F4EE;--surface:#FFFFFF;--surface-alt:#EFECE3;
  --text:#211E18;--text2:#6E675C;--text3:#A39B8D;
  --border:#DED8CA;--shadow:0 1px 2px rgba(35,30,20,.05);
  --btn-grad:#FFFFFF;
  --btn-shad:rgba(143,113,69,.14);
  --font:'Didot','Iowan Old Style','Hiragino Mincho ProN','Yu Mincho','Noto Serif JP',serif;
  --card-radius:0;--chip-radius:0;
}
[data-theme="pop"]{
  --primary:#EE2D74;--primary-dark:#CE1A5E;--primary-light:#FF74A8;
  --ink:#231A2E;
  --bg:#FFF8EA;--surface:#fff;--surface-alt:#FFF1D6;
  --text:#231A2E;--text2:#6F6280;--text3:#A99CBA;
  --border:#231A2E;--shadow:3px 3px 0 rgba(35,26,46,.85);
  --btn-grad:#EE2D74;
  --btn-shad:rgba(35,26,46,.85);
  --font:'Arial Rounded MT Bold','Hiragino Maru Gothic ProN','Yu Gothic UI',sans-serif;
  --card-radius:16px;--chip-radius:20px;
}
[data-theme="neko"]{
  --primary:#E08A9B;--primary-dark:#C96E81;--primary-light:#F3B7C4;
  --bg:#FBF5EC;--surface:#fff;--surface-alt:#F5EBDE;
  --text:#463A30;--text2:#8A7767;--text3:#B7A693;
  --border:#EDDFCE;--shadow:0 3px 14px rgba(160,120,90,.10);
  --btn-grad:linear-gradient(150deg,#E999A9,#D67487);
  --btn-shad:rgba(214,116,135,.28);
  --font:'Hiragino Maru Gothic ProN','Arial Rounded MT Bold','Yu Gothic UI',sans-serif;
  --card-radius:18px;--chip-radius:18px;
}
[data-theme="impressionist"]{
  --primary:#7A68B8;--primary-dark:#5D4C9C;--primary-light:#A697D6;
  --bg:#F4F2F8;--surface:rgba(255,255,255,.86);--surface-alt:rgba(243,240,250,.9);
  --text:#4A4158;--text2:#7E7392;--text3:#A89EBB;
  --border:rgba(122,104,184,.16);--shadow:0 4px 24px rgba(122,104,184,.08);
  --btn-grad:linear-gradient(135deg,#8A79C9,#5D8FC7);
  --btn-shad:rgba(122,104,184,.22);
  --font:'Hiragino Mincho ProN','Yu Mincho','Noto Serif JP',serif;
  --card-radius:14px;--chip-radius:20px;
}
[data-theme="antique"]{
  --primary:#7C2D1E;--primary-dark:#5E2013;--primary-light:#A04B33;
  --bg:#EDE4CD;--surface:#F7F0DD;--surface-alt:#E3D7BA;
  --text:#3A2E21;--text2:#6C5942;--text3:#95815F;
  --border:#CBBA93;--shadow:0 2px 8px rgba(58,46,33,.10);
  --btn-grad:linear-gradient(150deg,#8A3524,#611F12);
  --btn-shad:rgba(124,45,30,.25);
  --font:'Iowan Old Style','Baskerville','Hiragino Mincho ProN','Yu Mincho','Noto Serif JP',serif;
  --card-radius:2px;--chip-radius:2px;
}
[data-theme="cyberpunk"]{
  --primary:#35E0CE;--primary-dark:#1FB3A5;--primary-light:#7FF0E3;
  --bg:#0A0E14;--surface:#10161E;--surface-alt:#17222C;
  --text:#C7D5DF;--text2:#7C90A1;--text3:#4C5F70;
  --border:#1E2D3A;--shadow:0 0 14px rgba(53,224,206,.05);
  --btn-grad:linear-gradient(160deg,#0E141C,#152430);
  --btn-shad:rgba(53,224,206,.20);
  --font:'Menlo','Consolas','Hiragino Sans','Yu Gothic UI',monospace;
  --card-radius:0;--chip-radius:0;
}

/* ══════════════════════════════════════
   Base Layout
   ══════════════════════════════════════ */
html,body{height:100%;height:100dvh;overflow:hidden}
body{
  font-family:var(--font);background:var(--bg);color:var(--text);
  -webkit-tap-highlight-color:transparent;transition:background .4s,color .3s;
}
#app{display:flex;flex-direction:column;height:100%;padding-top:env(safe-area-inset-top,0px);position:relative}

/* ══════════ Header ══════════ */
header{
  padding:12px 16px 8px;display:flex;align-items:center;gap:8px;
  background:var(--bg);position:relative;z-index:10;flex-shrink:0;transition:background .4s;
}
header h1{font-size:20px;font-weight:800;color:var(--primary);transition:color .3s;position:relative}
.theme-trigger{
  width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border);
  background:var(--surface);font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .3s;
}
.theme-trigger:active{transform:scale(.9)}
#location-badge{margin-left:auto;font-size:12px;color:var(--text2);display:flex;align-items:center;gap:4px}

/* ══════════ Views ══════════ */
.view{display:none;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.view.active{display:flex;flex-direction:column}

/* ══════════ Discover ══════════ */
#v-discover{align-items:center;gap:24px;padding:20px 16px calc(60px + env(safe-area-inset-bottom,0px))}
.discover-hint{font-size:13px;color:var(--text3);text-align:center;line-height:1.6;max-width:260px;transition:color .3s;margin-top:auto}
.tag-row{margin-bottom:auto}

/* ══════════ Button ══════════ */
.btn-wrap{position:relative;display:flex;align-items:center;justify-content:center;padding:16px}
.discover-btn{
  width:clamp(150px,42vw,190px);height:clamp(150px,42vw,190px);
  border-radius:50%;border:none;cursor:pointer;position:relative;
  background:var(--btn-grad);color:#fff;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:6px;font-family:var(--font);
  box-shadow:0 6px 30px var(--btn-shad);transition:transform .15s,box-shadow .3s;
}
.discover-btn:active{transform:scale(.93)}
.discover-btn .icon{font-size:44px;line-height:1}
.discover-btn .label{font-size:15px;font-weight:700}
.discover-btn.loading .icon{animation:spin 1.2s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ══════════ Radius & Tags ══════════ */
.radius-row{display:flex;gap:8px}
.radius-opt{
  padding:6px 16px;border-radius:var(--chip-radius);border:1.5px solid var(--border);
  background:var(--surface);color:var(--text2);font-size:13px;font-weight:600;
  cursor:pointer;font-family:var(--font);transition:all .3s;
}
.radius-opt.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.tag-row{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;max-width:340px}
.tag-chip{
  padding:4px 10px;border-radius:var(--chip-radius);font-size:11px;font-weight:600;
  border:1.5px solid var(--border);background:var(--surface);color:var(--text2);
  cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:3px;
}
.tag-chip.active{border-color:currentColor;background:var(--surface-alt)}

/* ══════════ Results ══════════ */
#v-results{padding:0 0 calc(60px + env(safe-area-inset-bottom,0px))}
.results-bar{
  position:sticky;top:0;z-index:5;background:var(--bg);
  padding:10px 16px;display:flex;align-items:center;gap:10px;
  border-bottom:1px solid var(--border);flex-shrink:0;transition:background .4s;
}
.results-bar .back{
  width:36px;height:36px;border-radius:50%;border:none;
  background:var(--surface-alt);font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;color:var(--text);
}
.results-bar .summary{flex:1;font-size:14px;font-weight:600}
.results-bar .redo{
  width:36px;height:36px;border-radius:50%;border:none;
  background:var(--primary);color:#fff;font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.card-list{padding:8px 12px;display:flex;flex-direction:column;gap:8px}

/* ══════════ Card ══════════ */
.card{
  background:var(--surface);border-radius:var(--card-radius);
  box-shadow:var(--shadow);overflow:hidden;
  animation:cardIn .35s ease both;transition:background .4s,box-shadow .3s;
}
.card:nth-child(n){animation-delay:calc(var(--i,0) * 40ms)}
@keyframes cardIn{from{opacity:0;transform:translateY(16px)}}
.card-body{padding:12px 14px 10px;display:flex;gap:10px}
.card-main{flex:1;min-width:0}
.card-meta{display:flex;align-items:center;gap:6px;font-size:11px;margin-bottom:4px;flex-wrap:wrap}
.card-cat{
  padding:2px 7px;border-radius:10px;font-weight:700;color:#fff;
  white-space:nowrap;display:inline-flex;align-items:center;gap:2px;
}
.card-dist{color:var(--text2);white-space:nowrap}
.card-title{font-size:15px;font-weight:700;margin-bottom:4px;line-height:1.4}
.card-excerpt{font-size:12px;color:var(--text2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.card-thumb{width:72px;height:72px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--surface-alt)}
.card-actions{display:flex;border-top:1px solid var(--border)}
.card-actions button{
  flex:1;padding:10px 4px;border:none;background:none;font-size:12px;
  color:var(--text2);cursor:pointer;font-family:var(--font);font-weight:600;
  display:flex;align-items:center;justify-content:center;gap:4px;transition:color .2s,background .2s;
}
.card-actions button:active{background:var(--surface-alt)}
.card-actions button.fav-on{color:#E71D36}
.card-actions button+button{border-left:1px solid var(--border)}

/* ══════════ Favorites ══════════ */
#v-favs{padding:12px 12px calc(60px + env(safe-area-inset-bottom,0px))}
.section-title{font-size:18px;font-weight:800;padding:4px 4px 12px}
.empty-state{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;color:var(--text3);padding:40px 20px;text-align:center;
}
.empty-state .big{font-size:48px}
.empty-state p{font-size:14px;line-height:1.6}

/* ══════════ Bottom Nav ══════════ */
nav{
  position:fixed;bottom:0;left:0;right:0;
  height:calc(60px + env(safe-area-inset-bottom,0px));
  padding-bottom:env(safe-area-inset-bottom,0px);
  background:var(--surface);border-top:1px solid var(--border);
  display:flex;z-index:20;transition:background .4s;
}
nav button{
  flex:1;border:none;background:none;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;color:var(--text3);font-family:var(--font);font-size:10px;font-weight:600;transition:color .2s;
}
nav button .ni{font-size:22px}
nav button.active{color:var(--primary)}

/* ══════════ PWA Standalone ══════════ */
@media(display-mode:standalone){
  nav{height:calc(52px + env(safe-area-inset-bottom,0px))}
  #v-discover{padding-bottom:calc(52px + env(safe-area-inset-bottom,0px))}
  #v-results{padding-bottom:calc(52px + env(safe-area-inset-bottom,0px))}
  #v-favs{padding-bottom:calc(52px + env(safe-area-inset-bottom,0px))}
  #toast{bottom:calc(52px + env(safe-area-inset-bottom,0px) + 12px)}
}

/* ══════════ Toast ══════════ */
#toast{
  position:fixed;bottom:calc(60px + env(safe-area-inset-bottom,0px) + 12px);
  left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--text);color:var(--bg);padding:10px 20px;border-radius:24px;
  font-size:13px;font-weight:600;z-index:50;opacity:0;
  transition:transform .3s,opacity .3s;pointer-events:none;white-space:nowrap;
}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* ══════════════════════════════════════
   Theme: DEFAULT — 旅行情報誌
   ══════════════════════════════════════ */
[data-theme="default"] header h1{letter-spacing:.04em}
[data-theme="default"] .discover-btn::after{
  content:'';position:absolute;inset:-9px;border-radius:50%;
  border:1.5px solid var(--primary-light);opacity:.45;
  animation:pulse 3s ease-in-out infinite;
}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.4}50%{transform:scale(1.07);opacity:.12}}

/* ══════════════════════════════════════
   Theme: LUXURY — 余白と細線の上質誌面
   （高級=暗色+金グロウではなく、白磁+墨+ヘアライン）
   ══════════════════════════════════════ */
[data-theme="luxury"] header h1{font-weight:500;letter-spacing:.4em;font-size:15px}
[data-theme="luxury"] header h1::after{
  content:'';display:block;width:2.2em;height:1px;background:var(--primary);margin-top:5px;
}
[data-theme="luxury"] .theme-trigger{border-radius:0}
[data-theme="luxury"] .discover-hint{letter-spacing:.12em;font-size:12px;line-height:2.1;color:var(--text2)}
[data-theme="luxury"] .discover-btn{
  background:var(--surface);color:var(--text);
  border:1px solid var(--primary);
  box-shadow:0 10px 36px rgba(35,30,20,.10);
}
[data-theme="luxury"] .discover-btn .icon{font-size:30px;color:var(--primary)}
[data-theme="luxury"] .discover-btn .label{font-weight:500;letter-spacing:.3em;font-size:12px;color:var(--text)}
[data-theme="luxury"] .discover-btn::after{
  content:'';position:absolute;inset:6px;border-radius:50%;
  border:1px solid var(--border);
}
[data-theme="luxury"] .discover-btn::before{
  content:'';position:absolute;inset:-10px;border-radius:50%;
  border:1px solid rgba(143,113,69,.25);
}
[data-theme="luxury"] .tag-chip{letter-spacing:.08em;font-size:10px;padding:5px 13px;background:transparent}
[data-theme="luxury"] .tag-chip.active{border-color:var(--text);background:var(--surface)}
[data-theme="luxury"] .radius-opt{letter-spacing:.1em;font-size:12px;background:transparent}
[data-theme="luxury"] .radius-opt.active{background:var(--text);border-color:var(--text);color:var(--bg)}
[data-theme="luxury"] .card{border:1px solid var(--border);box-shadow:none}
[data-theme="luxury"] .card-title{font-weight:600;letter-spacing:.06em}
[data-theme="luxury"] .card-excerpt{line-height:1.95;letter-spacing:.02em}
[data-theme="luxury"] .card-cat{border-radius:0;letter-spacing:.08em;font-size:10px;font-weight:500;filter:saturate(.6) brightness(.92)}
[data-theme="luxury"] .card-actions button{letter-spacing:.14em;font-size:11px;font-weight:400}
[data-theme="luxury"] nav{border-top:1px solid var(--border)}
[data-theme="luxury"] nav button{letter-spacing:.18em;font-size:9px}
[data-theme="luxury"] .section-title{font-weight:500;letter-spacing:.3em;font-size:15px}

/* ══════════════════════════════════════
   Theme: POP — Y2Kステッカー / 誌面インク縁どり
   （虹グラデ回転ではなく、インク縁+ハード影の「ステッカー」言語で統一）
   ══════════════════════════════════════ */
[data-theme="pop"] header h1{
  font-weight:900;font-size:21px;
  background:linear-gradient(transparent 62%,#FFD84D 62%,#FFD84D 92%,transparent 92%);
}
[data-theme="pop"] .theme-trigger{border:2px solid var(--ink);box-shadow:2px 2px 0 var(--ink)}
[data-theme="pop"] .discover-hint{font-weight:700;font-size:13px;color:var(--text2)}
[data-theme="pop"] .discover-btn{
  border:3px solid var(--ink);
  box-shadow:6px 6px 0 var(--ink);
}
[data-theme="pop"] .discover-btn:active{transform:translate(4px,4px) scale(.98);box-shadow:2px 2px 0 var(--ink)}
[data-theme="pop"] .discover-btn .icon{font-size:46px}
[data-theme="pop"] .discover-btn .label{font-size:16px;font-weight:900}
[data-theme="pop"] .btn-wrap::before{
  content:'★';position:absolute;top:4px;left:14%;font-size:20px;color:#FFC820;
  text-shadow:-1.5px 1.5px 0 var(--ink);transform:rotate(-12deg);
}
[data-theme="pop"] .btn-wrap::after{
  content:'★';position:absolute;bottom:8px;right:15%;font-size:15px;color:#27C4F5;
  text-shadow:-1.5px 1.5px 0 var(--ink);transform:rotate(18deg);
}
[data-theme="pop"] .tag-chip{
  border:2px solid var(--ink);background:var(--surface);font-weight:800;
  padding:4px 11px;font-size:11px;box-shadow:2px 2px 0 var(--ink);
}
[data-theme="pop"] .tag-chip.active{
  background:currentColor;-webkit-text-fill-color:#fff;
  box-shadow:none;transform:translate(2px,2px);
}
[data-theme="pop"] .radius-opt{
  border:2px solid var(--ink);color:var(--text);font-weight:800;
  background:var(--surface);box-shadow:2px 2px 0 var(--ink);
}
[data-theme="pop"] .radius-opt.active{background:#FFC820;color:var(--ink);border-color:var(--ink);box-shadow:none;transform:translate(2px,2px)}
[data-theme="pop"] .card{border:2px solid var(--ink)}
[data-theme="pop"] .card-title{font-weight:900;font-size:16px}
[data-theme="pop"] .card-cat{border:1.5px solid var(--ink);border-radius:20px;padding:2px 9px;font-size:11px}
[data-theme="pop"] .card-actions{border-top:2px solid var(--ink)}
[data-theme="pop"] .card-actions button{font-weight:800;font-size:12px}
[data-theme="pop"] .card-actions button+button{border-left:2px solid var(--ink)}
[data-theme="pop"] nav{border-top:2px solid var(--ink)}
[data-theme="pop"] nav button{font-weight:800;font-size:11px}
[data-theme="pop"] nav button .ni{font-size:24px}
[data-theme="pop"] .section-title{font-weight:900;font-size:20px;color:var(--primary)}

/* ══════════════════════════════════════
   Theme: NEKO — ねこ雑誌（2トーン耳+まるさ）
   ══════════════════════════════════════ */
[data-theme="neko"] header h1{font-weight:800}
[data-theme="neko"] .btn-wrap::before,[data-theme="neko"] .btn-wrap::after{
  content:'';position:absolute;top:6px;width:44px;height:38px;z-index:2;
  clip-path:polygon(50% 0%,2% 100%,98% 100%);
  background:radial-gradient(ellipse 52% 62% at 50% 100%,var(--primary-light) 0,var(--primary-light) 58%,var(--primary-dark) 60%);
}
[data-theme="neko"] .btn-wrap::before{left:calc(50% - 74px);transform:rotate(-18deg)}
[data-theme="neko"] .btn-wrap::after{right:calc(50% - 74px);transform:rotate(18deg)}
[data-theme="neko"] .discover-btn .icon{font-size:46px}
[data-theme="neko"] .discover-btn::after{
  content:'';position:absolute;inset:-9px;border-radius:50%;
  border:2px dashed var(--primary-light);opacity:.5;
  animation:spin 40s linear infinite;
}
[data-theme="neko"] .discover-btn::before{
  content:'';position:absolute;bottom:26%;left:50%;transform:translateX(-50%);
  width:9px;height:7px;background:var(--primary-dark);
  border-radius:50% 50% 60% 60%;opacity:.55;
}
[data-theme="neko"] .discover-hint{font-size:13px}
[data-theme="neko"] .tag-chip{border:1.5px solid var(--border);background:var(--surface)}
[data-theme="neko"] .tag-chip.active{border-color:currentColor;background:var(--surface-alt)}
[data-theme="neko"] .radius-opt.active{border-color:var(--primary)}
[data-theme="neko"] .card{border:1.5px solid var(--border)}
[data-theme="neko"] .card-thumb{border-radius:14px}
[data-theme="neko"] .card-title{color:#5A4636}
[data-theme="neko"] nav button .ni{font-size:24px}
[data-theme="neko"] #v-discover::before{
  content:'🐾';position:absolute;top:64px;left:18px;
  font-size:26px;opacity:.10;transform:rotate(-24deg);pointer-events:none;
}
[data-theme="neko"] #v-discover::after{
  content:'🐾';position:absolute;bottom:96px;right:20px;
  font-size:34px;opacity:.12;transform:rotate(18deg);pointer-events:none;
}

/* ══════════════════════════════════════
   Theme: IMPRESSIONIST — 淡い光と色彩
   （和文にイタリックは使わない。明朝の細身+可視の色ブロブで表現）
   ══════════════════════════════════════ */
[data-theme="impressionist"] header h1{font-weight:600;letter-spacing:.28em;font-size:16px}
[data-theme="impressionist"] header h1::after{

/* ══════════════════════════════════════
   Theme Picker Modal
   ══════════════════════════════════════ */
.theme-modal{
  position:fixed;inset:0;z-index:100;display:flex;align-items:flex-end;
  pointer-events:none;opacity:0;transition:opacity .25s;
}
.theme-modal.open{pointer-events:auto;opacity:1}

}

  border-radius:12px;border:2.5px solid transparent;padding:14px 12px;
  cursor:pointer;text-align:left;font-family:var(--font);
  transition:transform .15s,border-color .2s;position:relative;overflow:hidden;
}

.tc-desc{font-size:10px;margin-top:3px;opacity:.6;line-height:1.4}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1 id="app-title">寄り道ナビ</h1>
    <button class="theme-trigger" id="btn-theme" aria-label="テーマ">🎨</button>
    <div id="location-badge"><span id="loc-text">--</span></div>

  <div id="v-discover" class="view active">

</div>

<script>
/* ═══════════ Config ═══════════ */
const WIKI = 'https://ja.wikipedia.org/w/api.php';
const RADII = [

const CATS = [

/* ═══════ Wikipedia カテゴリ → アプリカテゴリ 対応表 ═══════ */
const CAT_WIKI_MAP = [

/* ═══════ Stage 2: Visit-worthy signals (スコア加点) ═══════ */
const VISIT_KW = [
  '観光','名所','景勝','文化財','重要文化財','国宝','天然記念物','史跡',

/* ═══════════ Geo ═══════════ */
function getPosition(){
  return new Promise((ok,ng)=>{
    if(!navigator.geolocation) return ng(new Error('Geolocation非対応'));
    navigator.geolocation.getCurrentPosition(
      p=>ok({lat:p.coords.latitude,lon:p.coords.longitude}),e=>ng(e),
      {enableHighAccuracy:true,timeout:12000,maximumAge:30000}
    );
  });
}
function haversine(a,b,c,d){const R=6371000,t=Math.PI/180,dL=(c-a)*t,dN=(d-b)*t;const x=Math.sin(dL/2)**2+Math.cos(a*t)*Math.cos(c*t)*Math.sin(dN/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))}
function bearing(a,b,c,d){const t=Math.PI/180,dN=(d-b)*t;const y=Math.sin(dN)*Math.cos(c*t),x=Math.cos(a*t)*Math.sin(c*t)-Math.sin(a*t)*Math.cos(c*t)*Math.cos(dN);return['北','北東','東','南東','南','南西','西','北西'][Math.round(((Math.atan2(y,x)*180/Math.PI+360)%360)/45)%8]}
function fmtDist(m){return m<1000?`${Math.round(m)}m`:m<10000?`${(m/1000).toFixed(1)}km`:`${Math.round(m/1000)}km`}

/* ═══════════ Wikipedia API ═══════════ */
function searchPoints(lat,lon,r){
  if(r<=3000) return[{lat,lon,r}];
  const off=r<=5000?.025:r<=10000?.055:.14;
  const lo=off/Math.cos(lat*Math.PI/180);
  const pts=[{lat,lon,r:Math.min(r,10000)},
    {lat:lat+off,lon,r:Math.min(r,10000)},{lat:lat-off,lon,r:Math.min(r,10000)},
    {lat,lon:lon+lo,r:Math.min(r,10000)},{lat,lon:lon-lo,r:Math.min(r,10000)}];
  if(r>10000)pts.push(
    {lat:lat+off,lon:lon+lo,r:10000},{lat:lat+off,lon:lon-lo,r:10000},
    {lat:lat-off,lon:lon+lo,r:10000},{lat:lat-off,lon:lon-lo,r:10000});
  return pts;
}
async function geoSearch(lat,lon,r){
  const res=await fetch(`${WIKI}?action=query&list=geosearch&gscoord=${lat}|${lon}&gsradius=${r}&gslimit=50&format=json&origin=*`);
  return(await res.json()).query?.geosearch||[];
}
async function fetchDetails(ids){
  if(!ids.length)return{};
  const batches=[];
  for(let i=0;i<ids.length;i+=50)batches.push(ids.slice(i,i+50));
  const results=await Promise.all(batches.map(b=>
    fetch(`${WIKI}?action=query&pageids=${b.join('|')}&prop=extracts|pageimages|info|categories|extlinks&exintro=1&explaintext=1&pithumbsize=300&inprop=url&cllimit=500&clshow=!hidden&ellimit=500&format=json&origin=*`).then(r=>r.json())
  ));
  const all={};
  for(const j of results)if(j.query?.pages)Object.assign(all,j.query.pages);
  return all;
}
async function reverseGeo(lat,lon){
  try{const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&zoom=10&accept-language=ja`);
  const j=await r.json(),a=j.address||{};return a.city||a.town||a.village||a.county||j.display_name?.split(',')[0]||''}catch{return''}
}
function isExcluded(title){
  if(EXCLUDE_KW.some(k=>title.includes(k))) return true;
  if(EXCLUDE_RE.test(title)) return true;
  if(/駅(\s*\(.+\))?$/.test(title)&&!title.includes('道の駅')) return true;
  if(/町(\s*\(.+\))?$/.test(title)&&!/城下町|宿場町|門前町/.test(title)) return true;
  return false;
}
function categorize(title,extract,wikiCats){
  if(wikiCats&&wikiCats.length){
    const names=wikiCats.map(wc=>wc.title.replace(/^[^:]+:/,''));
    for(const m of CAT_WIKI_MAP){
      if(names.some(n=>m.re.test(n)))
        return CATS.find(c=>c.id===m.id)||CAT_OTHER;
    }
  }
  const full=(title+' '+(extract||'')).toLowerCase();
  for(const c of CATS)if(c.kw.some(k=>
    k.length===1 ? title.includes(k) : full.includes(k.toLowerCase())
  ))return c;
  return CAT_OTHER;
}
function scoreSpot(title,extract,hasThumb,cat,nLinks,articleLen){
  let s=50;
  const text=title+(extract||''), ext=extract||'', len=ext.length;
  if(cat.id!=='other') s+=30;
  if(hasThumb) s+=20;
  if(len>100) s+=2;
  if(len>300) s+=3;
  if(len>600) s+=5;
  if(articleLen>=15000) s+=45;
  else if(articleLen>=8000) s+=30;
  else if(articleLen>=3000) s+=15;
  if(nLinks>=6) s+=35;
  else if(nLinks>=3) s+=20;
  else if(nLinks>=1) s+=10;
  let vHits=0;
  VISIT_KW.forEach(k=>{if(text.includes(k)){s+=6;vHits++}});
  let nHits=0;
  NOISE_KW.forEach(k=>{if(ext.includes(k)){s-=8;nHits++}});
  if(nHits>=3&&vHits===0) s-=20;
  if(cat.id==='other'){
    if(!hasThumb) s-=15;
    if(len<80) s-=20;
    if(vHits===0) s-=10;
    if(nHits>0&&vHits===0) s-=15;
  }
  return s;
}
function trackPref(c,w){prefs[c]=(prefs[c]||0)+w;localStorage.setItem('yn_pref',JSON.stringify(prefs))}
function rankSpots(l){return l.sort((a,b)=>{
  const sa=a.score+(prefs[a.cat.id]||0)*5;
  const sb=b.score+(prefs[b.cat.id]||0)*5;
  return sb-sa||a.dist-b.dist;
})}

/* ═══════════ Discover ═══════════ */
async function discover(){
  const theme=THEMES.find(t=>t.id===currentTheme)||THEMES[0];
  $btn.classList.add('loading');$btnLabel.textContent=theme.btnSearching;
  if(navigator.vibrate)navigator.vibrate(40);
  try{
    pos=await getPosition();
    const area=await reverseGeo(pos.lat,pos.lon);
    $locText.textContent=area?`📍 ${area}`:`📍 ${pos.lat.toFixed(2)}, ${pos.lon.toFixed(2)}`;
    const pts=searchPoints(pos.lat,pos.lon,radius);
    const raw=[],seen=new Set();
    const results=await Promise.all(pts.map(p=>geoSearch(p.lat,p.lon,p.r)));
    for(const list of results)for(const item of list)if(!seen.has(item.pageid)){seen.add(item.pageid);raw.push(item)}
    if(!raw.length){toast('この辺は穴場すぎました！半径を広げてみてください');return}
    const details=await fetchDetails(raw.map(r=>r.pageid));
    const scored=raw.map(r=>{const d=details[r.pageid]||{},dist=haversine(pos.lat,pos.lon,r.lat,r.lon);
      const cat=categorize(r.title,d.extract,d.categories),hasThumb=!!d.thumbnail?.source;
      return{id:r.pageid,title:r.title,lat:r.lat,lon:r.lon,dist,dir:bearing(pos.lat,pos.lon,r.lat,r.lon),
        cat,extract:d.extract||'',thumb:d.thumbnail?.source||'',
        url:d.fullurl||`https://ja.wikipedia.org/wiki/${encodeURIComponent(r.title)}`,
        score:scoreSpot(r.title,d.extract,hasThumb,cat,(d.extlinks||[]).filter(l=>!EXTLINK_NOISE.test(l['*']||'')).length,d.length||0)}
    }).filter(s=>s.dist<=radius*1.1&&!isExcluded(s.title));
    let th=40;spots=scored.filter(s=>s.score>th);
    if(spots.length<5){th=25;spots=scored.filter(s=>s.score>th)}
    if(spots.length<3){th=15;spots=scored.filter(s=>s.score>th)}
    if(!spots.length){toast(scored.length?`${raw.length}件中、おすすめスポットが見つかりません。半径を広げてみてください`:'近くにWikipedia記事がありません。半径を広げてみてください');return}
    spots=rankSpots(spots);showResults();
  }catch(e){
    if(e.code===1)toast('位置情報を許可してください');
    else if(e.code===3)toast('位置の取得がタイムアウトしました');
    else toast('エラー: '+e.message);
  }finally{$btn.classList.remove('loading');$btnLabel.textContent=theme.btnLabel}
}

/* ═══════════ Render ═══════════ */
function showResults(){
  const f=activeTags.size?spots.filter(s=>activeTags.has(s.cat.id)):spots;
  $summary.textContent=`${f.length}件のスポット（${RADII.find(r=>r.m===radius)?.label||''}圏内）`;
  $cards.innerHTML='';f.forEach((s,i)=>$cards.appendChild(makeCard(s,i)));switchView('v-results');
}
function makeCard(spot,idx){
  const card=document.createElement('div');card.className='card';card.style.setProperty('--i',idx);
  const isFav=!!favs[spot.id],mu=`https://www.google.com/maps/dir/?api=1&destination=${spot.lat},${spot.lon}`;
  card.innerHTML=`<div class="card-body"><div class="card-main">
    <div class="card-meta"><span class="card-cat" style="background:${spot.cat.color}">${spot.cat.icon} ${spot.cat.label}</span>
    <span class="card-dist">${fmtDist(spot.dist)} ${spot.dir}</span></div>
    <div class="card-title">${esc(spot.title)}</div>
    <div class="card-excerpt">${esc(spot.extract.slice(0,140))}</div>
    </div>${spot.thumb?`<img class="card-thumb" src="${spot.thumb}" alt="" loading="lazy">`:''}</div>
    <div class="card-actions">
      <button data-act="navi" data-url="${esc(mu)}">🗺️ ナビ</button>
      <button data-act="wiki" data-url="${esc(spot.url)}">📖 読む</button>
      <button data-act="fav" data-id="${spot.id}" class="${isFav?'fav-on':''}">${isFav?'★ 保存済':'☆ 保存'}</button>
    </div>`;
  card.querySelectorAll('[data-act]').forEach(b=>{b.addEventListener('click',()=>{
    if(b.dataset.act==='navi'){trackPref(spot.cat.id,3);window.open(b.dataset.url,'_blank')}
    else if(b.dataset.act==='wiki'){trackPref(spot.cat.id,1);window.open(b.dataset.url,'_blank')}
    else toggleFav(spot,b);
  })});return card;
}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

/* ═══════════ Favorites ═══════════ */
function toggleFav(spot,btn){
  if(favs[spot.id]){delete favs[spot.id];btn.classList.remove('fav-on');btn.textContent='☆ 保存';toast('お気に入りから削除しました')}
  else{favs[spot.id]={id:spot.id,title:spot.title,lat:spot.lat,lon:spot.lon,cat:spot.cat,extract:spot.extract.slice(0,140),thumb:spot.thumb,url:spot.url,saved:Date.now()};
  btn.classList.add('fav-on');btn.textContent='★ 保存済';trackPref(spot.cat.id,2);toast('お気に入りに保存しました')}
  localStorage.setItem('yn_fav',JSON.stringify(favs));
}
function renderFavs(){
  const list=Object.values(favs).sort((a,b)=>(b.saved||0)-(a.saved||0));
  $favEmpty.style.display=list.length?'none':'';$favList.innerHTML='';
  list.forEach((f,i)=>{
    const card=document.createElement('div');card.className='card';card.style.setProperty('--i',i);
    const mu=`https://www.google.com/maps/dir/?api=1&destination=${f.lat},${f.lon}`;
    card.innerHTML=`<div class="card-body"><div class="card-main">
      <div class="card-meta"><span class="card-cat" style="background:${f.cat.color}">${f.cat.icon} ${f.cat.label}</span></div>
      <div class="card-title">${esc(f.title)}</div><div class="card-excerpt">${esc(f.extract)}</div>
      </div>${f.thumb?`<img class="card-thumb" src="${f.thumb}" alt="" loading="lazy">`:''}</div>
      <div class="card-actions">
        <button data-act="navi" data-url="${esc(mu)}">🗺️ ナビ</button>
        <button data-act="wiki" data-url="${esc(f.url)}">📖 読む</button>
        <button data-act="del" data-id="${f.id}">🗑️ 削除</button>
      </div>`;
    card.querySelectorAll('[data-act]').forEach(b=>{b.addEventListener('click',()=>{
      if(b.dataset.act==='del'){delete favs[f.id];localStorage.setItem('yn_fav',JSON.stringify(favs));renderFavs();toast('削除しました')}
      else window.open(b.dataset.url,'_blank');
    })});$favList.appendChild(card);
  });
}

/* ═══════════ Theme System ═══════════ */
function applyTheme(id){
  const t=THEMES.find(x=>x.id===id)||THEMES[0];currentTheme=t.id;
  document.documentElement.setAttribute('data-theme',t.id);
  localStorage.setItem('yn_theme',t.id);
  $title.textContent=t.headerName;$btnIcon.textContent=t.btnIcon;$btnLabel.textContent=t.btnLabel;
  $hint.innerHTML=t.hint;
  $('nav-discover').textContent=t.navDiscover;$('nav-favs').textContent=t.navFavs;
  $('nav-discover-label').textContent=t.navDiscoverLabel;$('nav-favs-label').textContent=t.navFavsLabel;
  document.querySelector('meta[name="theme-color"]')?.setAttribute('content',t.preview.primary);
  document.querySelectorAll('.view').forEach(v=>v.scrollTop=0);
  buildRadius();buildTags();renderThemeGrid();
}
function renderThemeGrid(){
  $themeGrid.innerHTML='';
  THEMES.forEach(t=>{
    const c=document.createElement('button');
    c.className='theme-card'+(t.id===currentTheme?' active':'');
    c.style.cssText=`background:${t.preview.bg};color:${t.preview.text};border-color:${t.id===currentTheme?t.preview.primary:'transparent'}`;
    c.innerHTML=`<div class="tc-preview">
      <div class="tc-dot" style="background:${t.preview.primary}"></div>
      <div class="tc-dot" style="background:${t.preview.surface}"></div>
      <div class="tc-mini-btn" style="background:${t.preview.primary};opacity:.7"></div>
      </div><div class="tc-name">${t.icon} ${t.name}</div><div class="tc-desc">${t.desc}</div>`;
    c.addEventListener('click',()=>{applyTheme(t.id);closeThemeModal()});
    $themeGrid.appendChild(c);
  });
}
function openThemeModal(){$themeModal.classList.add('open');renderThemeGrid()}
function closeThemeModal(){$themeModal.classList.remove('open')}

/* ═══════════ UI ═══════════ */
function switchView(id){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  $(id).classList.add('active');
  document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('active',b.dataset.v===id));
  if(id==='v-favs')renderFavs();
}
function toast(msg){$toast.textContent=msg;$toast.classList.add('show');setTimeout(()=>$toast.classList.remove('show'),2500)}
function buildRadius(){
  $radRow.innerHTML='';
  RADII.forEach(r=>{const b=document.createElement('button');
    b.className='radius-opt'+(r.m===radius?' active':'');b.textContent=r.label;
    b.addEventListener('click',()=>{radius=r.m;$radRow.querySelectorAll('.radius-opt').forEach(x=>x.classList.remove('active'));b.classList.add('active')});
    $radRow.appendChild(b);
  });
}
function buildTags(){
  $tagRow.innerHTML='';
  CATS.forEach(c=>{const ch=document.createElement('button');
    ch.className='tag-chip'+(activeTags.has(c.id)?' active':'');ch.style.color=c.color;
    ch.innerHTML=`${c.icon} ${c.label}`;
    ch.addEventListener('click',()=>{
      if(activeTags.has(c.id)){activeTags.delete(c.id);ch.classList.remove('active')}
      else{activeTags.add(c.id);ch.classList.add('active')}
      if(spots.length&&$('v-results').classList.contains('active'))showResults();
    });$tagRow.appendChild(ch);
  });
}
